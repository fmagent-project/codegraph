name: Release

# FM-Agent maintenance fork — trimmed from upstream's release workflow.
#
# Manually triggered ("Run workflow"). On trigger it:
#   1. reads the version from package.json,
#   2. builds a self-contained bundle for mac + linux (arm64/x64) on one runner
#      (no native compilation, so cross-packaging is fine),
#   3. creates the GitHub Release (tag v<version>) with all archives + SHA256SUMS.
#
# Before triggering: bump package.json's version to the target (e.g.
# 1.3.0-fmagent.N) and make sure the #1211 fix is on this branch.
#
# Removed vs upstream: npm publish, npmmirror sync, and the CHANGELOG /
# package-lock auto-commit-and-push steps — this fork distributes only via
# GitHub Releases and never pushes back to a protected branch, so no RELEASE_PAT
# or NPM_TOKEN secret is needed.
on:
  workflow_dispatch: {}

permissions:
  contents: write   # create the GitHub Release + tag

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Resolve version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build platform bundles (mac + linux)
        run: |
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            bash scripts/build-bundle.sh "$t"
          done
          ls -lh release

      - name: Generate SHA256SUMS
        # The launcher verifies downloaded bundles against this (basenames only).
        run: |
          ( cd release && sha256sum codegraph-* > SHA256SUMS )
          cat release/SHA256SUMS

      - name: Release notes
        run: |
          V="${{ steps.ver.outputs.version }}"
          printf 'FM-Agent maintenance fork build **%s**.\n\nUpstream v1.3.0 + #1211 fix (upstream PR #1223): the C extractor blanks macro attributes before a typedef'"'"'d return type, so functions like `LITE_OS_SEC_TEXT_INIT UINT32 LOS_KernelInit(VOID)` are indexed under their name.\n\nSelf-contained per-OS bundles (darwin/linux, arm64/x64) — no Node or build tools needed. See FORK.md.\n' "$V" > notes.md
          cat notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          # Idempotent: create the release once, otherwise (re-run) refresh assets.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/codegraph-* release/SHA256SUMS --clobber
          else
            gh release create "$TAG" release/codegraph-* release/SHA256SUMS --title "$TAG" --notes-file notes.md
          fi
